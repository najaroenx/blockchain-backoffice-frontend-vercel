sonar.projectKey=merchant-back-office-frontend
sonar.projectName=Merchant Back Office Frontend
sonar.projectVersion=0.1.0

# Source
sonar.sources=src
sonar.tests=__tests__
sonar.exclusions=**/__tests__/**,**/node_modules/**,**/.next/**,**/coverage/**,**/*.d.ts,**/public/**

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Test coverage (Jest lcov output)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Test results (optional — requires jest-sonar-reporter)
# sonar.testExecutionReportPaths=coverage/test-reporter.xml

# Encoding
sonar.sourceEncoding=UTF-8
